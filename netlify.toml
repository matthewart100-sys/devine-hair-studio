[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/consultation"
  to = "/.netlify/functions/consultation"
  status = 200

[[redirects]]
  from = "/about"
  to = "/assets/about.html"
  status = 200

[[redirects]]
  from = "/services"
  to = "/assets/services.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/assets/portfolio.html"
  status = 200

[[redirects]]
  from = "/consultation"
  to = "/assets/consultation.html"
  status = 200
